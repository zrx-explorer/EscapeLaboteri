<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>逃离来伯特利 · Escape from Lebethel</title>
  <meta name="description" content="RPG · 非对称对抗 · Roguelike · HTML5 多端 Demo">
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #0b0d12; color: #e8e6df;
      font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
      overflow: hidden;
      user-select: none; -webkit-user-select: none;
    }
    #stage { display: block; margin: 0 auto; background: #14171f; }
    #fps {
      position: fixed; top: 6px; right: 8px; color: #6a7;
      font: 12px/1 monospace; opacity: .55; pointer-events: none;
    }
    .hint {
      position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%);
      color: #888; font-size: 12px; pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="stage" width="1024" height="640"></canvas>
  <div id="fps"></div>
  <div class="hint">WASD 移动 · 左键攻击 · Q/E 技能 · 1/2/3 道具 · F 切换队友伤害 · R 内奸亮明</div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
